server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: hmdp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123456}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  elasticsearch:
    rest:
      uris: ${ES_URIS:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    listener:
      ack-mode: manual_immediate
    template:
      default-topic: ${KAFKA_DEFAULT_TOPIC:seckill-order}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:seckill-order-g1}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false

app:
  kafka:
    relay:
      consumer-name: ${KAFKA_RELAY_CONSUMER_NAME:}
    consumer:
      fail-once: false
      fail-always: false
      fail-voucher-id: -1
    fail-task:
      auto-retry-enabled: true
      retry-interval-ms: 15000
      batch-size: 20
      max-retry-count: 5
    monitor:
      enabled: true
      lag-threshold: 500
      interval-ms: 60000
  seckill:
    reconcile:
      enabled: true
      interval-ms: 300000

# Canal配置
canal:
  enabled: ${CANAL_ENABLED:false}
  host: ${CANAL_HOST:localhost}
  port: ${CANAL_PORT:11111}
  destination: ${CANAL_DESTINATION:example}
  batch-size: ${CANAL_BATCH_SIZE:100}

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: info
  pattern:
    dateformat: mm:ss.SSS
